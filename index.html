<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Filmi Fillers - Final Working Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #050609; color: white; text-align: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 420px; background: #282a36; border: 1.5px solid #ffcc00; padding: 10px 20px; border-radius: 30px; margin-bottom: 20px; }
        .game-container { background: #1e1f29; padding: 20px; border-radius: 20px; width: 100%; max-width: 420px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .word-display { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 25px 0; min-height: 50px; }
        .letter-box { width: 30px; height: 35px; border-bottom: 3px solid #ffcc00; font-size: 22px; font-weight: bold; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .key { padding: 8px; background: #282a36; border: 1px solid #3a3d52; color: white; cursor: pointer; border-radius: 5px; }
        .win-card { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .win-card.show { display: flex; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div id="pName">👤 SUDHIR</div>
        <div id="pScore">🏆 0 PTS</div>
    </div>
    <div class="game-container">
        <h2 id="stageTitle" style="color:#ffcc00;">STAGE 1</h2>
        <div id="instruction" style="color:#a0a5b5;">Guess the Movie</div>
        <div class="word-display" id="wordDisplay"></div>
        <div class="keyboard" id="keyboard"></div>
    </div>
    <div class="win-card" id="winCard">
        <h1 style="color:#2ed573;">LEVEL CLEARED! 🎉</h1>
        <button onclick="nextLevel()" style="padding:15px 30px; cursor:pointer;">NEXT LEVEL 🎬</button>
    </div>

    <script>
        const gameData = [
            { stage: "STAGE 1", prompt: "Guess the Movie", list: ["SHOLAY", "DANGAL", "LAGAAN"] },
            { stage: "STAGE 2", prompt: "Guess the Hero", list: ["SALMAN", "SHAHRUKH", "AKSHAY"] },
            { stage: "STAGE 3", prompt: "Guess the Heroine", list: ["KAJOL", "DEEPIKA", "ALIA"] }
        ];

        let sIdx = 0, iIdx = 0, points = 0, guessed = [];

        function render() {
            let target = gameData[sIdx].list[iIdx];
            document.getElementById("stageTitle").innerText = gameData[sIdx].stage;
            document.getElementById("instruction").innerText = gameData[sIdx].prompt;
            
            const disp = document.getElementById("wordDisplay"); disp.innerHTML = "";
            target.split("").forEach(l => {
                let d = document.createElement("div"); d.className = "letter-box";
                d.innerText = guessed.includes(l) ? l : ""; disp.appendChild(d);
            });

            const kbd = document.getElementById("keyboard"); kbd.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                let b = document.createElement("button"); b.className = "key"; b.innerText = l;
                b.onclick = () => {
                    if(!guessed.includes(l)) {
                        guessed.push(l);
                        if(target.includes(l)) points += 100;
                        document.getElementById("pScore").innerText = `🏆 ${points} PTS`;
                        render();
                        if(target.split("").every(x => guessed.includes(x))) document.getElementById("winCard").classList.add("show");
                    }
                };
                kbd.appendChild(b);
            });
        }

        function nextLevel() {
            iIdx++;
            if(iIdx >= gameData[sIdx].list.length) { sIdx++; iIdx = 0; }
            guessed = []; 
            document.getElementById("winCard").classList.remove("show");
            render();
        }

        render();
    </script>
</body>
</html>
