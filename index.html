<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmi Fillers - Professional Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #111424, #050609); color: white; text-align: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 8px; }
        
        /* स्टार्टिंग स्क्रीन */
        #startScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111424; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 420px; background: #282a36; border: 1.5px solid #ffcc00; padding: 6px 12px; border-radius: 30px; margin-bottom: 12px; box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); }
        .profile-side { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #a0a5b5; }
        .profile-side strong { color: #ffcc00; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .edit-mini-btn { background: none; border: none; color: #ffcc00; font-size: 11px; cursor: pointer; text-decoration: underline; }
        .score-side { font-size: 14px; font-weight: bold; color: #ffcc00; }

        .game-container { background: #1e1f29; padding: 12px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5); width: 100%; max-width: 420px; position: relative; }
        h1 { color: #ffcc00; font-size: 20px; margin-bottom: 2px; }
        .sub-text { color: #a0a5b5; font-size: 11px; margin-bottom: 8px; }
        .controls-row { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 10px; width: 100%; }
        .audio-toggle, .hint-btn { background: #3a3d52; color: #ffcc00; border: none; padding: 6px 10px; font-size: 11px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; }
        .hint-btn { background: #ff9f43; color: #000; box-shadow: 0 3px 8px rgba(255, 159, 67, 0.2); }
        
        .word-display { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 12px; background: #11121a; padding: 15px 10px; border-radius: 10px; border-left: 4px solid #ffcc00; min-height: 70px; align-items: center; }
        .movie-word { display: flex; gap: 4px; white-space: nowrap; }
        .letter-box { width: 18px; height: 26px; border-bottom: 2.5px solid #ffcc00; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 5px; padding-bottom: 5px; }
        .key { background: #282a36; color: white; border: 1.5px solid #3a3d52; padding: 8px 0; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 11%; min-width: 32px; text-align: center; }
        .key.hidden-key { opacity: 0.3; pointer-events: none; }
        .key.correct-key { background: #2ed573; border-color: #2ed573; color: white; }
        .key.wrong-key { background: #ff4757; border-color: #ff4757; color: white; }
        
        .win-card, .leaderboard-card { background: rgba(30, 31, 41, 0.98); position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; z-index: 10; display: none; }
        .win-card.show, .leaderboard-card.show { display: flex; }
        .next-btn { background: #ffcc00; color: #050609; font-size: 16px; font-weight: bold; padding: 10px 30px; border: none; border-radius: 10px; cursor: pointer; width: 80%; margin-top: 10px; }
        .rank-table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 12px; }
        .rank-table th, .rank-table td { padding: 6px; border-bottom: 1px solid #3a3d52; text-align: center; }
        .rank-table th { color: #ffcc00; }
        .highlight-my-rank { background: rgba(255, 204, 0, 0.1); color: #ffcc00; font-weight: bold; }
        
        .table-name-block { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .table-city-sub { font-size: 10px; color: #a0a5b5; font-weight: normal; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1 style="color:#ffcc00; font-size:40px; margin-bottom:20px;">🎬 FILMI FILLERS</h1>
        <p style="color:white; margin-bottom:30px;">Ek Aisa Puzzle Jo Hai Sabse Hatke!</p>
        <button onclick="document.getElementById('startScreen').style.display='none'" style="background:#ffcc00; padding:15px 40px; border:none; border-radius:50px; font-size:20px; font-weight:bold; cursor:pointer;">START GAME ▶️</button>
    </div>

    <div class="top-bar">
        <div class="profile-side">
            👤 <strong id="playerIdentityText">SUDHIR</strong>
            <button class="edit-mini-btn" onclick="editPlayerName()">✏️Edit</button>
        </div>
        <div class="score-side">
            🏆 <span id="pointsDisplay">0</span> PTS
        </div>
    </div>

    <div class="game-container">
        <div class="win-card" id="winCard">
            <h2 style="color: #2ed573; font-size: 26px; margin-bottom: 5px;">SUPERB! 🎉❤️</h2>
            <button class="next-btn" onclick="nextMovie()">NEXT MOVIE 🎬</button>
        </div>

        <div class="leaderboard-card" id="leaderboardCard">
            <h2 style="color: #ffcc00; font-size: 22px; margin-bottom: 5px;">🏆 ALL INDIA RANKING 🏆</h2>
            <table class="rank-table">
                <thead><tr><th>Rank</th><th>Player Name</th><th>Points</th></tr></thead>
                <tbody>
                    <tr class="highlight-my-rank">
                        <td>#Your Rank</td>
                        <td><div class="table-name-block"><span id="tablePlayerName">SUDHIR</span><span id="tablePlayerCity" class="table-city-sub">(SILVASSA)</span></div></td>
                        <td><span id="tableMyScore">0</span></td>
                    </tr>
                </tbody>
            </table>
            <button class="next-btn" style="background:#2ed573; color:white;" onclick="restartGame()">RESTART 🔄</button>
        </div>

        <h1 id="levelDisplay">FILM PUZZLE 🎬</h1>
        <div class="controls-row">
            <button class="audio-toggle" id="musicBtn" onclick="toggleMusic()">🎵 MUSIC: OFF</button>
            <button class="hint-btn" onclick="useHint()">💡 HINT (-1500 PTS)</button>
        </div>
        <div class="word-display" id="wordDisplay"></div>
        <div class="keyboard" id="keyboard"></div>
    </div>

    <script>
        const movieBank = ["SHOLAY", "DANGAL", "BAAHUBALI"];
        let currentMovieIndex = 0; let points = 0; let playerName = "SUDHIR"; let playerCity = "SILVASSA";
        let guessedLetters = [];

        function editPlayerName() {
            let n = prompt("Enter Name:", playerName);
            if (n) playerName = n.toUpperCase();
            let c = prompt("Enter City:", playerCity);
            if (c) playerCity = c.toUpperCase();
            document.getElementById("playerIdentityText").innerText = playerName;
        }

        function startNewLevel() {
            document.getElementById("winCard").classList.remove("show");
            let currentMovie = movieBank[currentMovieIndex];
            document.getElementById("levelDisplay").innerText = `MOVIE ${currentMovieIndex + 1}/${movieBank.length} 🎬`;
            guessedLetters = []; displayMovie(currentMovie); createKeyboard(currentMovie);
        }

        function displayMovie(m) {
            const container = document.getElementById("wordDisplay"); container.innerHTML = "";
            m.split("").forEach(l => {
                const box = document.createElement("div"); box.className = "letter-box";
                box.innerText = guessedLetters.includes(l) ? l : ""; container.appendChild(box);
            });
        }

        function createKeyboard(m) {
            const k = document.getElementById("keyboard"); k.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement("button"); b.className = "key"; b.innerText = l;
                b.onclick = () => {
                    if (m.includes(l)) { b.classList.add("correct-key", "hidden-key"); points += 1000; guessedLetters.push(l); }
                    else { b.classList.add("wrong-key", "hidden-key"); points = Math.max(0, points - 500); }
                    document.getElementById("pointsDisplay").innerText = points; displayMovie(m);
                    if (m.split("").every(x => guessedLetters.includes(x))) document.getElementById("winCard").classList.add("show");
                };
                k.appendChild(b);
            });
        }

        function nextMovie() {
            currentMovieIndex++;
            if (currentMovieIndex < movieBank.length) startNewLevel();
            else {
                document.getElementById("tableMyScore").innerText = points;
                document.getElementById("tablePlayerName").innerText = playerName;
                document.getElementById("tablePlayerCity").innerText = "(" + playerCity + ")";
                document.getElementById("leaderboardCard").classList.add("show");
            }
        }
        function restartGame() { currentMovieIndex = 0; points = 0; startNewLevel(); document.getElementById("leaderboardCard").classList.remove("show"); }
        startNewLevel();
    </script>
</body>
</html>
